<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0a0a0a;
      --paper: #f5f2ec;
      --mid: #c8c3b8;
      --accent: #0a0a0a;
      --border: 2px solid var(--ink);
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--paper);
      border: var(--border);
      width: 100%;
      max-width: 520px;
      position: relative;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 5px -5px -5px 5px;
      border: var(--border);
      z-index: -1;
      background: var(--ink);
    }

    .card-header {
      border-bottom: var(--border);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .card-header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .card-header span {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--mid);
      letter-spacing: 0.1em;
    }

    .card-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .input-row {
      display: flex;
      border: var(--border);
    }

    .input-row input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0.75rem 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--ink);
      outline: none;
    }

    .input-row input::placeholder { color: var(--mid); }

    .input-row button {
      border: none;
      border-left: var(--border);
      background: var(--ink);
      color: var(--paper);
      padding: 0 1.25rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #333; }

    .qr-area {
      border: var(--border);
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .qr-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--mid);
    }

    .qr-placeholder svg { opacity: 0.3; }

    .qr-placeholder p {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #qr-output {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 1.5rem;
      width: 100%;
    }

    #qr-output.visible { display: flex; }

    #qr-canvas-wrapper { line-height: 0; }

    #qr-canvas-wrapper canvas,
    #qr-canvas-wrapper img {
      display: block;
      image-rendering: pixelated;
    }

    .qr-url-label {
      margin-top: 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--mid);
      letter-spacing: 0.04em;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .size-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border: var(--border);
      padding: 0.6rem 1rem;
    }

    .size-row label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid);
      flex-shrink: 0;
    }

    .size-row input[type=range] {
      flex: 1;
      accent-color: var(--ink);
      cursor: pointer;
    }

    .size-row .size-val {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      min-width: 4ch;
      text-align: right;
    }

    .actions {
      display: flex;
      gap: 0;
      border: var(--border);
    }

    .actions button {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.7rem 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      color: var(--ink);
    }

    .actions button:not(:last-child) { border-right: var(--border); }

    .actions button:hover {
      background: var(--ink);
      color: var(--paper);
    }

    .actions button:disabled {
      color: var(--mid);
      cursor: not-allowed;
    }

    .actions button:disabled:hover {
      background: transparent;
      color: var(--mid);
    }

    /* SVG Panel */
    .svg-panel {
      display: none;
      flex-direction: column;
      border: var(--border);
      overflow: hidden;
    }

    .svg-panel.visible { display: flex; }

    .svg-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: var(--border);
      background: var(--ink);
      color: var(--paper);
    }

    .svg-panel-header span {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .svg-panel-tabs {
      display: flex;
      gap: 0;
    }

    .svg-tab {
      background: transparent;
      border: none;
      border-left: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
      padding: 0 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s;
    }

    .svg-tab:hover, .svg-tab.active { color: #fff; }

    /* Two-pane layout */
    .svg-panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .svg-preview-pane {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border-right: var(--border);
      padding: 1rem;
      min-height: 200px;
    }

    .svg-preview-pane svg {
      max-width: 100%;
      max-height: 180px;
    }

    .svg-code-pane {
      position: relative;
      background: #0a0a0a;
      overflow: hidden;
    }

    .svg-code-inner {
      height: 200px;
      overflow-y: auto;
      padding: 0.75rem 1rem;
      scrollbar-width: thin;
      scrollbar-color: #333 #0a0a0a;
    }

    .svg-code-inner::-webkit-scrollbar { width: 4px; }
    .svg-code-inner::-webkit-scrollbar-track { background: #0a0a0a; }
    .svg-code-inner::-webkit-scrollbar-thumb { background: #333; }

    #svg-code-display {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      line-height: 1.6;
      color: #8a8a8a;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #svg-code-display .tok-tag   { color: #e06c75; }
    #svg-code-display .tok-attr  { color: #d19a66; }
    #svg-code-display .tok-val   { color: #98c379; }
    #svg-code-display .tok-num   { color: #61afef; }

    .copy-svg-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: color 0.15s, border-color 0.15s;
    }

    .copy-svg-btn:hover { color: #fff; border-color: #666; }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: var(--ink);
      color: var(--paper);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      padding: 0.6rem 1.25rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>QR Generator</h1>
    <span>// PDF + SVG</span>
  </div>

  <div class="card-body">

    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://your-url.com" autocomplete="off" spellcheck="false"/>
      <button id="generate-btn">Generate</button>
    </div>

    <div class="size-row">
      <label>Size</label>
      <input type="range" id="size-slider" min="128" max="512" step="32" value="256"/>
      <span class="size-val" id="size-label">256px</span>
    </div>

    <div class="qr-area">
      <div class="qr-placeholder" id="qr-placeholder">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="24" height="24" rx="1" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
          <rect x="10" y="10" width="12" height="12" fill="#0a0a0a"/>
          <rect x="36" y="4" width="24" height="24" rx="1" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
          <rect x="42" y="10" width="12" height="12" fill="#0a0a0a"/>
          <rect x="4" y="36" width="24" height="24" rx="1" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
          <rect x="10" y="42" width="12" height="12" fill="#0a0a0a"/>
          <rect x="36" y="36" width="6" height="6" fill="#0a0a0a"/>
          <rect x="46" y="36" width="6" height="6" fill="#0a0a0a"/>
          <rect x="56" y="36" width="6" height="6" fill="#0a0a0a"/>
          <rect x="36" y="46" width="6" height="6" fill="#0a0a0a"/>
          <rect x="46" y="46" width="16" height="6" fill="#0a0a0a"/>
          <rect x="36" y="56" width="6" height="6" fill="#0a0a0a"/>
          <rect x="56" y="56" width="6" height="6" fill="#0a0a0a"/>
        </svg>
        <p>Enter a URL above</p>
      </div>

      <div id="qr-output">
        <div id="qr-canvas-wrapper"></div>
        <div class="qr-url-label" id="qr-url-label"></div>
      </div>
    </div>

    <!-- Actions: PDF + SVG only -->
    <div class="actions">
      <button id="pdf-btn" disabled>↓ PDF</button>
      <button id="svg-btn" disabled>⟨/⟩ SVG</button>
      <button id="clear-btn" disabled>✕ Clear</button>
    </div>

    <!-- SVG split panel: preview left, code right -->
    <div class="svg-panel" id="svg-panel">
      <div class="svg-panel-header">
        <span>SVG Output</span>
        <div class="svg-panel-tabs">
          <button class="svg-tab" id="close-svg-btn">✕ Close</button>
        </div>
      </div>
      <div class="svg-panes">
        <div class="svg-preview-pane" id="svg-preview-pane"></div>
        <div class="svg-code-pane">
          <div class="svg-code-inner">
            <pre id="svg-code-display"></pre>
          </div>
          <button class="copy-svg-btn" id="copy-svg-btn">Copy</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const urlInput    = document.getElementById('url-input');
  const genBtn      = document.getElementById('generate-btn');
  const sizeSlider  = document.getElementById('size-slider');
  const sizeLabel   = document.getElementById('size-label');
  const placeholder = document.getElementById('qr-placeholder');
  const qrOutput    = document.getElementById('qr-output');
  const qrWrapper   = document.getElementById('qr-canvas-wrapper');
  const qrUrlLabel  = document.getElementById('qr-url-label');
  const pdfBtn      = document.getElementById('pdf-btn');
  const svgBtn      = document.getElementById('svg-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const svgPanel    = document.getElementById('svg-panel');
  const svgPreview  = document.getElementById('svg-preview-pane');
  const svgCodeEl   = document.getElementById('svg-code-display');
  const copySvgBtn  = document.getElementById('copy-svg-btn');
  const closeSvgBtn = document.getElementById('close-svg-btn');
  const toast       = document.getElementById('toast');

  let currentUrl = '';
  let qrInstance = null;
  let currentSVG = '';

  sizeSlider.addEventListener('input', () => {
    sizeLabel.textContent = sizeSlider.value + 'px';
    if (currentUrl) generateQR();
  });

  genBtn.addEventListener('click', () => {
    const val = urlInput.value.trim();
    if (!val) { showToast('Please enter a URL'); return; }
    currentUrl = val;
    generateQR();
  });

  urlInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') genBtn.click();
  });

  function generateQR() {
    qrWrapper.innerHTML = '';
    if (qrInstance) { qrInstance.clear(); qrInstance = null; }
    svgPanel.classList.remove('visible');
    currentSVG = '';

    const size = parseInt(sizeSlider.value);
    qrInstance = new QRCode(qrWrapper, {
      text: currentUrl,
      width: size,
      height: size,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    qrUrlLabel.textContent = currentUrl;
    placeholder.style.display = 'none';
    qrOutput.classList.add('visible');
    pdfBtn.disabled   = false;
    svgBtn.disabled   = false;
    clearBtn.disabled = false;
  }

  // ── SVG generation from canvas ──────────────────────────────────────────────
  function canvasToSVG() {
    return new Promise((resolve, reject) => {
      const img = qrWrapper.querySelector('img');
      const canvasEl = qrWrapper.querySelector('canvas');
      const size = parseInt(sizeSlider.value);

      const offscreen = document.createElement('canvas');
      offscreen.width = offscreen.height = size;
      const ctx = offscreen.getContext('2d');

      const finish = () => {
        const imageData = ctx.getImageData(0, 0, size, size);
        const data = imageData.data;

        // Sample on a coarse grid to find module size
        // QR codes have quiet zones; find first dark pixel row/col
        let firstDark = -1;
        for (let y = 0; y < size && firstDark === -1; y++) {
          for (let x = 0; x < size; x++) {
            const i = (y * size + x) * 4;
            if (data[i] < 128) { firstDark = y; break; }
          }
        }

        // Estimate module count by scanning a row for transitions
        // Use row at firstDark + 1 to get stable reading
        const row = Math.min(firstDark + 2, size - 1);
        let transitions = 0;
        let prev = data[(row * size) * 4] < 128;
        for (let x = 1; x < size; x++) {
          const isDark = data[(row * size + x) * 4] < 128;
          if (isDark !== prev) { transitions++; prev = isDark; }
        }
        // modules ≈ (transitions + 1) / 2 columns but we just use pixel sampling
        // Simpler: scan each pixel and group into modules by rounding

        // Build rects: for each pixel sample the center
        // For large QRs, group adjacent dark pixels into rect runs (run-length per row)
        const rects = [];
        for (let row = 0; row < size; row++) {
          let runStart = -1;
          for (let col = 0; col <= size; col++) {
            const isDark = col < size && data[(row * size + col) * 4] < 128;
            if (isDark && runStart === -1) {
              runStart = col;
            } else if (!isDark && runStart !== -1) {
              rects.push({ x: runStart, y: row, w: col - runStart, h: 1 });
              runStart = -1;
            }
          }
        }

        // Merge vertically: if rect at (x,y,w,1) matches (x,y+1,w,1) → extend h
        const merged = [];
        // Sort by x, y
        rects.sort((a, b) => a.x - b.x || a.y - b.y);

        // Simple vertical merge using a map
        const key = r => `${r.x},${r.w}`;
        const active = new Map();
        const allRows = [...new Set(rects.map(r => r.y))].sort((a,b)=>a-b);

        // group rects by row
        const byRow = {};
        for (const r of rects) {
          if (!byRow[r.y]) byRow[r.y] = [];
          byRow[r.y].push(r);
        }

        const openRects = new Map(); // key → {x,y,w,h}

        for (let row = 0; row < size; row++) {
          const rowRects = byRow[row] || [];
          const rowKeys = new Set(rowRects.map(r => `${r.x},${r.w}`));

          // Close open rects not continued
          for (const [k, rect] of openRects) {
            if (!rowKeys.has(k)) {
              merged.push(rect);
              openRects.delete(k);
            }
          }

          // Extend or open
          for (const r of rowRects) {
            const k = `${r.x},${r.w}`;
            if (openRects.has(k)) {
              openRects.get(k).h++;
            } else {
              openRects.set(k, { x: r.x, y: r.y, w: r.w, h: 1 });
            }
          }
        }

        // Close remaining
        for (const rect of openRects.values()) merged.push(rect);

        // Build SVG string
        const svgParts = [
          `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" shape-rendering="crispEdges">`
        ];
        svgParts.push(`  <rect width="${size}" height="${size}" fill="#ffffff"/>`);
        for (const r of merged) {
          svgParts.push(`  <rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="#000000"/>`);
        }
        svgParts.push(`</svg>`);

        resolve(svgParts.join('\n'));
      };

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);

      if (img && img.src) {
        const image = new Image();
        image.onload = () => { ctx.drawImage(image, 0, 0, size, size); finish(); };
        image.onerror = reject;
        image.src = img.src;
      } else if (canvasEl) {
        ctx.drawImage(canvasEl, 0, 0, size, size);
        finish();
      } else {
        reject(new Error('No QR element found'));
      }
    });
  }

  // Syntax highlight SVG
  function highlightSVG(code) {
    return code
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/(&lt;\/?)([\w]+)/g, (_, bracket, tag) =>
        `<span class="tok-tag">${bracket}${tag}</span>`)
      .replace(/([\w-]+)=/g, '<span class="tok-attr">$1</span>=')
      .replace(/&quot;([^&]*)&quot;/g, '&quot;<span class="tok-val">$1</span>&quot;')
      .replace(/\b(\d+(\.\d+)?)\b/g, '<span class="tok-num">$1</span>');
  }

  // SVG button
  svgBtn.addEventListener('click', async () => {
    try {
      const svgStr = await canvasToSVG();
      currentSVG = svgStr;

      // Show preview
      svgPreview.innerHTML = svgStr;
      svgPreview.querySelector('svg').style.maxWidth = '100%';
      svgPreview.querySelector('svg').style.maxHeight = '180px';

      // Show highlighted code
      svgCodeEl.innerHTML = highlightSVG(svgStr);
      svgPanel.classList.add('visible');
      svgPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } catch(e) {
      showToast('SVG generation failed');
    }
  });

  // Copy SVG code
  copySvgBtn.addEventListener('click', async () => {
    if (!currentSVG) return;
    try {
      await navigator.clipboard.writeText(currentSVG);
      showToast('SVG code copied!');
      copySvgBtn.textContent = 'Copied!';
      setTimeout(() => copySvgBtn.textContent = 'Copy', 1800);
    } catch {
      showToast('Copy failed — select manually');
    }
  });

  closeSvgBtn.addEventListener('click', () => {
    svgPanel.classList.remove('visible');
  });

  // ── PDF ─────────────────────────────────────────────────────────────────────
  function getCleanCanvas() {
    return new Promise((resolve, reject) => {
      const img = qrWrapper.querySelector('img');
      const canvasEl = qrWrapper.querySelector('canvas');
      const size = parseInt(sizeSlider.value);

      const offscreen = document.createElement('canvas');
      offscreen.width = offscreen.height = size;
      const ctx = offscreen.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);

      if (img && img.src) {
        const image = new Image();
        image.onload = () => { ctx.drawImage(image, 0, 0, size, size); resolve(offscreen); };
        image.onerror = reject;
        image.src = img.src;
      } else if (canvasEl) {
        ctx.drawImage(canvasEl, 0, 0, size, size); resolve(offscreen);
      } else {
        reject(new Error('No QR element found'));
      }
    });
  }

  pdfBtn.addEventListener('click', async () => {
    try {
      const offscreen = await getCleanCanvas();
      const imgData = offscreen.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();

      const qrMM = 100;
      const x = (pageW - qrMM) / 2;
      const y = (pageH - qrMM) / 2 - 10;

      doc.setFillColor(255, 255, 255);
      doc.rect(x - 2, y - 2, qrMM + 4, qrMM + 4, 'F');
      doc.addImage(imgData, 'PNG', x, y, qrMM, qrMM);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(100, 100, 100);
      const label = currentUrl.length > 60 ? currentUrl.slice(0, 57) + '...' : currentUrl;
      doc.text(label, pageW / 2, y + qrMM + 8, { align: 'center' });
      doc.save('qrcode.pdf');
      showToast('PDF downloaded!');
    } catch(e) {
      showToast('PDF failed — try again');
    }
  });

  // ── Clear ───────────────────────────────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    qrWrapper.innerHTML = '';
    if (qrInstance) { qrInstance.clear(); qrInstance = null; }
    currentUrl = '';
    currentSVG = '';
    urlInput.value = '';
    qrOutput.classList.remove('visible');
    svgPanel.classList.remove('visible');
    placeholder.style.display = '';
    pdfBtn.disabled   = true;
    svgBtn.disabled   = true;
    clearBtn.disabled = true;
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
